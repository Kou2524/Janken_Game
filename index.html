<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Janken Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Pyxel WASM -->
  <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
    }

    pyxel-play, canvas {
      image-rendering: pixelated;
    }

    /* Pyxel の下に勝手に出る "Tap / Enter to Start" を隠す */
    pyxel-play::after {
      display: none !important;
    }

    /* 音ONボタン（iOS用の確実解禁スイッチ） */
    #sound-btn {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 99999;
      padding: 10px 14px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
    }
  </style>
</head>

<body>

  <div id="wrap">
    <!-- ✅ pyxapp起動（PUFで必要なパッケージも一緒にロード） -->
    <pyxel-play
      root="."
      name="JankenGame.pyxapp"
      gamepad="enabled"
      touchpad="enabled"
      packages="Pillow,numpy"
    ></pyxel-play>
  </div>

  <script>
    /* ====== BGM 切り替え（iOS/Safari対策：ボタンで確実解禁） ====== */

    // ルート直下に bgm1.mp3 / bgm2.mp3 がある前提
    const bgm1 = new Audio("./bgm1.mp3");
    const bgm2 = new Audio("./bgm2.mp3");

    bgm1.loop = true;
    bgm2.loop = true;

    bgm1.volume = 0.25;
    bgm2.volume = 0.25;

    bgm1.preload = "auto";
    bgm2.preload = "auto";

    let audioUnlocked = true;   // 音が解禁されたか
    let pendingScene = 0;        // 解禁前に要求されたsceneを保存

    function stopAllBGM() {
      [bgm1, bgm2].forEach(bgm => {
        try {
          bgm.pause();
          bgm.currentTime = 0;
        } catch (e) {}
      });
    }

    function playScene(scene) {
      stopAllBGM();

      let target = null;
      if (scene === 0) target = bgm1;      // タイトル
      else if (scene === 1) target = bgm2; // ゲーム中
      else if (scene === 2) target = bgm1; // リザルト等

      if (!target) return;

      // iOSはplay()がPromise rejectすることがあるので握りつぶす
      target.play().catch(() => {});
    }

    // Pyxel(Python) 側から呼ばれる
    window.set_bgm_scene = function(scene) {
      pendingScene = scene;

      // 解禁前は覚えるだけ
      if (!audioUnlocked) return;

      playScene(scene);
    };

  
  </script>
</body>
</html>
