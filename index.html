<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Janken Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Pyxel WASM -->
    <script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"></script>

    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #wrap {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
      }

      pyxel-play, canvas {
        image-rendering: pixelated;
      }

      /* Pyxel の下に勝手に出る "Tap / Enter to Start" を隠す */
      pyxel-play::after {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="wrap">

      <!-- ★ここがポイント：pyxapp起動 + Pillow/numpy をロード -->
      <pyxel-play
        root="."
        name="JankenGame.pyxapp"
        gamepad="enabled"
        touchpad="enabled"
        packages="Pillow,numpy"
      ></pyxel-play>

    </div>

    <script>
      /* ====== BGM 切り替え（iOS/Safari対策入り） ====== */

      // iOS対策：最初のユーザー操作が来るまで audio.play() しない
      let audioUnlocked = false;   // 1回でもユーザー操作があったか
      let pendingScene = 0;        // 解禁前に要求されたsceneを記憶

      // HTMLAudioElement（ルート直下のmp3を読む）
      const bgm1 = new Audio("./bgm1.mp3");
      const bgm2 = new Audio("./bgm2.mp3");

      bgm1.loop = true;
      bgm2.loop = true;

      bgm1.volume = 0.25;
      bgm2.volume = 0.25;

      function stopAllBGM() {
        for (const bgm of [bgm1, bgm2]) {
          try {
            bgm.pause();
            bgm.currentTime = 0;
          } catch (e) {}
        }
      }

      function playScene(scene) {
        stopAllBGM();

        let target = null;
        if (scene === 0) target = bgm1;     // タイトル
        else if (scene === 1) target = bgm2; // バトル中
        else if (scene === 2) target = bgm1; // リザルトとか

        if (!target) return;

        // iOSは play() が Promise reject することがあるので握りつぶす
        target.play().catch(() => {});
      }

      // Pyxel(Python) 側から呼ばれる関数（今まで通り）
      window.set_bgm_scene = function (scene) {
        pendingScene = scene;

        // まだ解禁されてないなら「覚えるだけ」
        if (!audioUnlocked) return;

        playScene(scene);
      };

      // ユーザー操作が来た瞬間に音を解禁して、保留中のBGMを流す
      function unlockAudioOnce() {
        if (audioUnlocked) return;
        audioUnlocked = true;
        playScene(pendingScene);
      }

      // iPhone対策：touchstart/pointerdown両方
      window.addEventListener("pointerdown", unlockAudioOnce, { once: true });
      window.addEventListener("touchstart", unlockAudioOnce, { once: true });
      window.addEventListener("keydown", unlockAudioOnce, { once: true });
    </script>
  </body>
</html>
